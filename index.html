            generatePDFFromSections(sessionIndices) {
                if (sessionIndices.length === 0) return;
                // Must open synchronously in the click handler — async open gets popup-blocked
                const outputWin = window.open('', '_blank');
                if (!outputWin) { alert('Please allow popups for this page and try again.'); return; }
                outputWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>F1 Run Plan</title>
                    <style>
                        * { margin:0; padding:0; box-sizing:border-box; }
                        body { background:#fff; }
                        .page { page-break-after:always; break-after:page; }
                        .page:last-child { page-break-after:avoid; break-after:avoid; }
                        img { display:block; }
                        @page { size: A4 portrait; margin: 8mm; }
                        @media print { * { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
                    </style>
                </head><body></body></html>`);
                outputWin.document.close();
                this._doScreenshots(sessionIndices, outputWin);
            }

            async _doScreenshots(sessionIndices, outputWin) {
                // Load html2canvas on first use
                if (!window.html2canvas) {
                    await new Promise((resolve, reject) => {
                        const s = document.createElement('script');
                        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                        s.onload = resolve;
                        s.onerror = reject;
                        document.head.appendChild(s);
                    });
                }

                // A4 portrait usable area at 96 dpi with 8mm margins each side:
                // (210 - 16) mm * 96/25.4 ≈ 734px wide
                // (297 - 16) mm * 96/25.4 ≈ 1062px tall
                const PAGE_W = 734;
                const PAGE_H = 1062;
                const SCALE  = 2; // capture at 2x for crisp text, divide back out for sizing

                // Map rendered timeline rows → session indices
                const visibleWithRuns = this.state.sessions
                    .map((s, i) => s.runs.length > 0 ? i : -1)
                    .filter(i => i >= 0);

                const appEl         = document.getElementById('app');
                const allSessionEls = Array.from(document.querySelectorAll('.session'));
                const footerEl      = document.querySelector('.footer');
                const addSessionRow = document.querySelector('.sessions > div.add-run');
                const tlContainer   = document.querySelector('.timeline-container');
                const allTlRows     = tlContainer ? Array.from(tlContainer.querySelectorAll('.timeline-session')) : [];

                for (const sessionIdx of sessionIndices) {
                    // ── Hide unwanted elements ──
                    if (footerEl)      footerEl.style.display      = 'none';
                    if (addSessionRow) addSessionRow.style.display  = 'none';
                    allTlRows.forEach((row, i) => {
                        row.style.display = visibleWithRuns[i] === sessionIdx ? '' : 'none';
                    });
                    const toReCollapse = [];
                    allSessionEls.forEach((el, i) => {
                        if (i !== sessionIdx) { el.style.display = 'none'; return; }
                        const content = el.querySelector('.session-content');
                        if (content && content.classList.contains('collapsed')) {
                            content.classList.remove('collapsed');
                            toReCollapse.push(content);
                        }
                        el.querySelectorAll('.add-run').forEach(b => b.style.visibility = 'hidden');
                    });

                    // ── Screenshot ──
                    const canvas = await window.html2canvas(appEl, {
                        scale: SCALE,
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: '#ffffff',
                        logging: false
                    });

                    // ── Restore DOM immediately ──
                    if (footerEl)      footerEl.style.display      = '';
                    if (addSessionRow) addSessionRow.style.display  = '';
                    allTlRows.forEach(row => row.style.display = '');
                    allSessionEls.forEach(el => {
                        el.style.display = '';
                        el.querySelectorAll('.add-run').forEach(b => b.style.visibility = '');
                    });
                    toReCollapse.forEach(c => c.classList.add('collapsed'));

                    // ── Scale image to fit page while preserving aspect ratio ──
                    const naturalW = canvas.width  / SCALE;
                    const naturalH = canvas.height / SCALE;
                    const fit      = Math.min(PAGE_W / naturalW, PAGE_H / naturalH);
                    const dispW    = Math.round(naturalW * fit);
                    const dispH    = Math.round(naturalH * fit);

                    const img = outputWin.document.createElement('img');
                    img.style.width  = dispW + 'px';
                    img.style.height = dispH + 'px';
                    img.src = canvas.toDataURL('image/png');

                    const page = outputWin.document.createElement('div');
                    page.className = 'page';
                    page.appendChild(img);
                    outputWin.document.body.appendChild(page);
                }

                // Wait for every image in the output window to finish loading,
                // then wait one render frame before opening the print dialog
                const imgs = Array.from(outputWin.document.querySelectorAll('img'));
                await Promise.all(imgs.map(img =>
                    img.complete
                        ? Promise.resolve()
                        : new Promise(r => { img.onload = r; img.onerror = r; })
                ));
                await new Promise(r => setTimeout(r, 200));

                outputWin.focus();
                outputWin.print();
            }

            attachEventListeners() {
                // Use event delegation on the app root to avoid duplicate listeners
                const app = document.getElementById('app');

                // Context menus
                app.oncontextmenu = (e) => {
                    if (this._suppressNextContextMenu) {
                        this._suppressNextContextMenu = false;
                        e.preventDefault();
                        return;
                    }
                    // Hide all menus first
                    document.getElementById('lap-context-menu').style.display = 'none';
                    document.getElementById('run-context-menu').style.display = 'none';
                    document.getElementById('session-context-menu').style.display = 'none';

                    // Session header right-click (must check before run-header since it's a parent)
                    const sessionHeader = e.target.closest('.session-header[data-session]');
                    const runHeader = e.target.closest('.run-header[data-run]');
                    if (sessionHeader && !runHeader) {
                        e.preventDefault();
                        const menu = document.getElementById('session-context-menu');
                        menu.style.display = 'block';
                        menu.style.left = e.clientX + 'px';
                        menu.style.top  = e.clientY + 'px';
                        menu.dataset.session = sessionHeader.dataset.session;
                        return;
                    }

                    // Run header right-click
                    if (runHeader) {
                        e.preventDefault();
                        const sIdx = parseInt(runHeader.dataset.session);
                        const rIdx = parseInt(runHeader.dataset.run);
                        const isCollapsed = this.state.sessions[sIdx].runs[rIdx].lapsCollapsed;
                        const menu = document.getElementById('run-context-menu');
                        menu.style.display = 'block';
                        menu.style.left = e.clientX + 'px';
                        menu.style.top  = e.clientY + 'px';
                        menu.dataset.session = sIdx;
                        menu.dataset.run     = rIdx;
                        document.getElementById('ctx-toggle-laps').textContent = isCollapsed ? 'Expand laps' : 'Collapse laps';
                        return;
                    }

                    // Lap row right-click
                    const tr = e.target.closest('tr[data-lap]');
                    if (tr) {
                        e.preventDefault();
                        const menu = document.getElementById('lap-context-menu');
                        menu.style.display = 'block';
                        menu.style.left = e.clientX + 'px';
                        menu.style.top  = e.clientY + 'px';
                        menu.dataset.session = tr.dataset.session;
                        menu.dataset.run     = tr.dataset.run;
                        menu.dataset.lap     = tr.dataset.lap;
                    }
                };

                // Dismiss all menus on any click
                document.onclick = () => {
                    ['lap-context-menu','run-context-menu','session-context-menu'].forEach(id => {
                        const m = document.getElementById(id);
                        if (m) m.style.display = 'none';
                    });
                };

                // Context menu item actions
                const ctxAddLap = document.getElementById('ctx-add-lap');
                if (ctxAddLap) {
                    ctxAddLap.onclick = (e) => {
                        e.stopPropagation();
                        const menu = document.getElementById('lap-context-menu');
                        menu.style.display = 'none';
                        this.insertLapAbove(
                            parseInt(menu.dataset.session),
                            parseInt(menu.dataset.run),
                            parseInt(menu.dataset.lap)
                        );
                    };
                }

                const ctxDeleteLap = document.getElementById('ctx-delete-lap');
                if (ctxDeleteLap) {
                    ctxDeleteLap.onclick = (e) => {
                        e.stopPropagation();
                        const menu = document.getElementById('lap-context-menu');
                        menu.style.display = 'none';
                        this.deleteLap(
                            parseInt(menu.dataset.session),
                            parseInt(menu.dataset.run),
                            parseInt(menu.dataset.lap)
                        );
                    };
                }

                const ctxDeleteSession = document.getElementById('ctx-delete-session');
                if (ctxDeleteSession) {
                    ctxDeleteSession.onclick = (e) => {
                        e.stopPropagation();
                        const menu = document.getElementById('session-context-menu');
                        menu.style.display = 'none';
                        this.deleteSession(parseInt(menu.dataset.session));
                    };
                }

                const ctxAddRunAbove = document.getElementById('ctx-add-run-above');
                if (ctxAddRunAbove) {
                    ctxAddRunAbove.onclick = (e) => {
                        e.stopPropagation();
                        const menu = document.getElementById('run-context-menu');
                        menu.style.display = 'none';
                        this.insertRunAbove(parseInt(menu.dataset.session), parseInt(menu.dataset.run));
                    };
                }

                const ctxToggleLaps = document.getElementById('ctx-toggle-laps');
                if (ctxToggleLaps) {
                    ctxToggleLaps.onclick = (e) => {
                        e.stopPropagation();
                        const menu = document.getElementById('run-context-menu');
                        menu.style.display = 'none';
                        const sIdx = parseInt(menu.dataset.session);
                        const rIdx = parseInt(menu.dataset.run);
                        this.state.sessions[sIdx].runs[rIdx].lapsCollapsed =
                            !this.state.sessions[sIdx].runs[rIdx].lapsCollapsed;
                        this.render();
                    };
                }

                const ctxDeleteRun = document.getElementById('ctx-delete-run');
                if (ctxDeleteRun) {
                    ctxDeleteRun.onclick = (e) => {
                        e.stopPropagation();
                        const menu = document.getElementById('run-context-menu');
                        menu.style.display = 'none';
                        this.deleteRun(parseInt(menu.dataset.session), parseInt(menu.dataset.run));
                    };
                }

                app.onclick = (e) => {
                    const target = e.target;
                    const action = target.dataset.action;

                    if (!action) {
                        // Check for session header clicks
                        const sessionHeader = target.closest('.session-header');
                        if (sessionHeader) {
                            const sessionIndex = parseInt(sessionHeader.dataset.session);
                            this.state.sessions[sessionIndex].collapsed = !this.state.sessions[sessionIndex].collapsed;
                            this.render();
                        }
                        return;
                    }

                    const sessionIdx = parseInt(target.dataset.session);
                    const runIdx = parseInt(target.dataset.run);

                    switch (action) {
                        case 'addRun':
                            e.preventDefault();
                            this.addRun(sessionIdx);
                            break;
                        case 'addSession':
                            e.preventDefault();
                            this.addSession();
                            break;
                        case 'copySession':
                            e.preventDefault();
                            this.copyLastSession();
                            break;
                        case 'deleteRun':
                            e.preventDefault();
                            this.deleteRun(sessionIdx, runIdx);
                            break;
                        case 'toggleLaps':
                            e.preventDefault();
                            this.state.sessions[sessionIdx].runs[runIdx].lapsCollapsed =
                                !this.state.sessions[sessionIdx].runs[runIdx].lapsCollapsed;
                            this.render();
                            break;
                        case 'editLapTypes':
                            this.state.editingLapTypes = true;
                            this.render();
                            break;
                        case 'saveLapTypes':
                            document.querySelectorAll('[data-laptype]').forEach(input => {
                                const lapType = input.dataset.laptype;
                                this.currentEvent.lapTypes[lapType].time = input.value;
                            });
                            this.state.editingLapTypes = false;
                            // Recalculate all run times across all sessions
                            this.state.sessions.forEach((session, sIdx) => {
                                session.runs.forEach((run, rIdx) => {
                                    run.laps.forEach(lap => {
                                        if (this.currentEvent.lapTypes[lap.lapType]) {
                                            lap.lapTime = this.currentEvent.lapTypes[lap.lapType].time;
                                        }
                                    });
                                    this.recalculateRunTimes(sIdx, rIdx);
                                });
                            });
                            this.render();
                            break;
                        case 'cancelLapTypes':
                            this.state.editingLapTypes = false;
                            this.render();
                            break;
                        case 'editRecipients':
                            this.state.editingRecipients = true;
                            this.render();
                            break;
                        case 'saveRecipients':
                            this.state.emailTo = document.getElementById('emailTo').value;
                            this.state.emailCC = document.getElementById('emailCC').value;
                            this.state.editingRecipients = false;
                            this.render();
                            break;
                        case 'cancelRecipients':
                            this.state.editingRecipients = false;
                            this.render();
                            break;
                        case 'saveDraft':
                            localStorage.setItem('runPlanDraft', JSON.stringify(this.state));
                            alert('Draft saved successfully!');
                            break;
                        case 'generatePDF':
                            this.state.editingPDF = true;
                            this.render();
                            break;
                        case 'confirmPDF': {
                            const selected = Array.from(document.querySelectorAll('.pdf-session-check:checked'))
                                .map(cb => parseInt(cb.dataset.session));
                            this.state.editingPDF = false;
                            this.render();
                            this.generatePDFFromSections(selected);
                            break;
                        }
                        case 'cancelPDF':
                            this.state.editingPDF = false;
                            this.render();
                            break;
                    }
                };

                // Keyboard handler for lap type selects:
                // - Letter keys visually select the preferred match (no commit yet)
                // - Enter commits the current value and advances to next lap
                // - Tab commits and advances (browser default already moves focus,
                //   but we still need to commit the value)
                // Mode column: left click  = editable text, text selected so typing replaces it
                //              right-drag  = paint value across multiple laps on release
                app.onmousedown = (e) => {
                    const cell = e.target.closest('td[data-mode-cell]');
                    if (!cell) return;

                    const sIdx = parseInt(cell.dataset.session);
                    const rIdx = parseInt(cell.dataset.run);
                    const lIdx = parseInt(cell.dataset.lap);
                    const input = cell.querySelector('input');

                    if (e.button === 2) {
                        // Right mouse button — start drag-paint
                        e.preventDefault();
                        this.dragMode = { sIdx, rIdx, startLap: lIdx, endLap: lIdx, dragged: false, isRightDrag: true };
                        if (input) this.dragMode.sourceValue = input.value.trim();
                        return;
                    }

                    // Left click — make editable and select all text so user can type to replace
                    if (input) {
                        input.removeAttribute('readonly');
                        input.focus();
                        // setTimeout so the selection survives the mouseup that follows mousedown
                        setTimeout(() => input.select(), 0);

                        input.onblur = () => {
                            const val = input.value.trim();
                            if (val) this.state.sessions[sIdx].runs[rIdx].laps[lIdx].mode = val;
                            this.render();
                        };
                    }
                };

                app.onmouseover = (e) => {
                    if (!this.dragMode || !this.dragMode.isRightDrag) return;
                    if (!(e.buttons & 2)) { this.dragMode = null; return; }
                    const cell = e.target.closest('td[data-mode-cell]');
                    if (!cell) return;
                    const sIdx = parseInt(cell.dataset.session);
                    const rIdx = parseInt(cell.dataset.run);
                    if (sIdx !== this.dragMode.sIdx || rIdx !== this.dragMode.rIdx) return;

                    const newLap = parseInt(cell.dataset.lap);
                    if (newLap !== this.dragMode.endLap) this.dragMode.dragged = true;
                    this.dragMode.endLap = newLap;

                    const lo = Math.min(this.dragMode.startLap, this.dragMode.endLap);
                    const hi = Math.max(this.dragMode.startLap, this.dragMode.endLap);

                    document.querySelectorAll('td[data-mode-cell]').forEach(c => {
                        const cs = parseInt(c.dataset.session);
                        const cr = parseInt(c.dataset.run);
                        const cl = parseInt(c.dataset.lap);
                        const tr = c.closest('tr');
                        if (cs === sIdx && cr === rIdx && cl >= lo && cl <= hi) {
                            tr.classList.add('lap-mode-dragging');
                        } else {
                            tr.classList.remove('lap-mode-dragging');
                        }
                    });
                };

                document.addEventListener('mouseup', (e) => {
                    if (!this.dragMode || !this.dragMode.isRightDrag) return;

                    const { sIdx, rIdx, startLap, endLap, sourceValue, dragged } = this.dragMode;
                    this.dragMode = null;
                    document.querySelectorAll('.lap-mode-dragging').forEach(r => r.classList.remove('lap-mode-dragging'));

                    if (!dragged) return; // right-click without drag — let context menu show normally

                    // Suppress the context menu that fires after a right mouseup
                    this._suppressNextContextMenu = true;

                    const finalValue = sourceValue || this.state.sessions[sIdx].runs[rIdx].laps[startLap].mode;
                    const lo = Math.min(startLap, endLap);
                    const hi = Math.max(startLap, endLap);
                    for (let i = lo; i <= hi; i++) {
                        this.state.sessions[sIdx].runs[rIdx].laps[i].mode = finalValue;
                    }
                    this.render();
                });

                app.onkeydown = (e) => {
                    const target = e.target;
                    if (target.dataset.action !== 'changeLapType') return;

                    const key = e.key;

                    if (key === 'Enter') {
                        e.preventDefault();
                        // Store next focus target before dispatching (render will destroy DOM)
                        const lapIdx = parseInt(target.dataset.lap);
                        const sessionIdx = target.dataset.session;
                        const runIdx = target.dataset.run;
                        this.pendingFocus = `laptype-${sessionIdx}-${runIdx}-${lapIdx + 1}`;
                        // Commit current selection — triggers onchange → render
                        target.dispatchEvent(new Event('change', { bubbles: true }));
                        return;
                    }

                    // Single-letter shortcut: map to preferred type and select it
                    // without dispatching change (no re-render until Enter)
                    const preferred = {
                        p: 'push', c: 'cool', o: 'out', i: 'in',
                        r: 'prep', u: 'push-in', t: 'out-in'
                    };
                    const mapped = preferred[key.toLowerCase()];
                    if (mapped) {
                        e.preventDefault();
                        // Find the option and select it visually
                        const option = Array.from(target.options).find(opt => opt.value === mapped);
                        if (option) target.value = mapped;
                    }
                };

                app.onchange = (e) => {
                    const target = e.target;
                    const action = target.dataset.action;

                    if (!action) {
                        // Handle specific IDs
                        if (target.id === 'eventSelect') {
                            this.state.selectedEventId = target.value;
                            this.state.sessions = [];
                            this.loadEvent(this.state.selectedEventId);
                            this.render();
                        } else if (target.id === 'engineerName') {
                            this.state.engineer = target.value;
                        } else if (target.id === 'emailTo') {
                            this.state.emailTo = target.value;
                        } else if (target.id === 'emailCC') {
                            this.state.emailCC = target.value;
                        } else if (target.id === 'issueNumber') {
                            this.state.issueNumber = parseInt(target.value);
                        }
                        return;
                    }

                    const sessionIdx = parseInt(target.dataset.session);
                    const runIdx = parseInt(target.dataset.run);
                    const lapIdx = parseInt(target.dataset.lap);

                    switch (action) {
                        case 'toggleVisible':
                            this.state.sessions[sessionIdx].visible = target.checked;
                            this.render();
                            break;
                        case 'updateSessionName':
                            this.state.sessions[sessionIdx].name = target.value;
                            break;
                        case 'updateSessionStart':
                            this.state.sessions[sessionIdx].start = target.value;
                            this.recalculateAllRunTimes(sessionIdx);
                            this.render();
                            break;
                        case 'updateSessionEnd':
                            this.state.sessions[sessionIdx].end = target.value;
                            this.render();
                            break;
                        case 'updateSessionNotes':
                            this.state.sessions[sessionIdx].notes = target.value;
                            break;
                        case 'changeTireSet':
                            this.changeTireSet(sessionIdx, runIdx, target.value);
                            break;
                        case 'changeLapCount':
                            this.updateLapCount(sessionIdx, runIdx, parseInt(target.value));
                            break;
                        case 'changeLapMode':
                            this.state.sessions[sessionIdx].runs[runIdx].laps[lapIdx].mode = target.value;
                            this.render();
                            break;
                        case 'changeLapType':
                            this.updateLapType(sessionIdx, runIdx, lapIdx, target.value);
                            break;
                        case 'changeGarageTime':
                            this.state.sessions[sessionIdx].runs[runIdx].garageTime = parseInt(target.value) || 0;
                            this.recalculateRunTimes(sessionIdx, runIdx);
                            this.render();
                            break;
                        case 'changeStartFuel':
                            this.state.sessions[sessionIdx].runs[runIdx].startFuel = parseFloat(target.value) || 110;
                            this.render();
                            break;
                        case 'updateNotes':
                            this.state.sessions[sessionIdx].runs[runIdx].notes = target.value;
                            break;
                        case 'changeLapNotes':
                            this.state.sessions[sessionIdx].runs[runIdx].laps[lapIdx].notes = target.value;
                            break;
                    }
                };
            }
        }

        // Initialize app when page loads
        const app = new RunPlanApp();
    </script>
</body>
</html>
